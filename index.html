    function getAdminConversationBuffer(){return readMemoryArray(MEM_KEYS.chatAdminConversationsBuffer)}
    function getAdminMessageBuffer(){return readMemoryArray(MEM_KEYS.chatAdminMessagesBuffer).map(normalizeChatMessage)}
    function saveAdminChatBuffers(conversations=[],messages=[]){
      writeMemory(MEM_KEYS.chatAdminConversationsBuffer,Array.isArray(conversations)?conversations:[]);
      writeMemory(MEM_KEYS.chatAdminMessagesBuffer,(Array.isArray(messages)?messages:[]).map(normalizeChatMessage));
      const meta=readMemory(MEM_KEYS.chatSyncMeta,{});
      writeMemory(MEM_KEYS.chatSyncMeta,{...meta,adminCacheUpdatedAt:now()});
    }
    function uniqueChatMessageKey(message){
      return message?.remoteId || message?.id || [message?.visitorId,message?.role,message?.text,message?.createdAt].join("|");
    }

    function dedupeChatMessages(messages=[]){
      const map=new Map();
      (Array.isArray(messages)?messages:[]).map(normalizeChatMessage).forEach(m=>{
        if(!m.text) return;
        const key=uniqueChatMessageKey(m);
        const existing=map.get(key);
        if(!existing || (existing.syncStatus!=="synced" && m.syncStatus==="synced")) map.set(key,m);
      });
      return [...map.values()].sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
    }

    function getAllAdminChatMessages(){
      return dedupeChatMessages([
        ...chatMessages(),
        ...getAdminMessageBuffer(),
        ...(Array.isArray(state.chatAdminMessages)?state.chatAdminMessages:[])
      ]);
    }

    function getAllAdminConversationRows(){
      const map=new Map();
      [...getAdminConversationBuffer(), ...(Array.isArray(state.chatAdminConversations)?state.chatAdminConversations:[])].forEach(row=>{
        const id=row?.visitor_id || row?.visitorId;
        if(!id) return;
        const old=map.get(id);
        if(!old || new Date(row.updated_at||row.updatedAt||row.last_message_at||0)>new Date(old.updated_at||old.updatedAt||old.last_message_at||0)) map.set(id,row);
      });
      return [...map.values()];
    }

    function isOfficialConversation(conversation){
      if(!conversation) return false;

      const visitorId=String(conversation.visitorId||conversation.visitor_id||"").trim();
      const name=String(conversation.visitorName||conversation.visitor_name||conversation.name||"").trim();
      const phone=String(conversation.visitorPhone||conversation.visitor_phone||conversation.phone||"").trim();

      if(!visitorId) return false;
      if(visitorId.startsWith("anonymous")) return false;
      if(!name) return false;
      if(!phone) return false;
      if(conversation.uiOnly) return false;
      if(conversation.deleted || conversation.archived) return false;
      if(conversation.identity_confirmed === false || conversation.identityConfirmed === false) return false;

      return true;
    }

    function mergeRemoteMessagesIntoLocal(remoteMessages=[], options={}){
      const remote = (Array.isArray(remoteMessages)?remoteMessages:[]).map(remoteChatMessageToLocal).filter(Boolean);
      const isAdminMode=!!options.admin;
      if(isAdminMode){
        const memoryMessages=getAdminMessageBuffer().slice();
        const map=new Map(memoryMessages.map(m=>[uniqueChatMessageKey(m),m]));
        let added=0, updated=0;
        remote.forEach(msg=>{
          const keys=[msg.remoteId,msg.id,[msg.visitorId,msg.role,msg.text,msg.createdAt].join("|")].filter(Boolean);
          let existingKey=keys.find(k=>map.has(k));
          if(!existingKey){memoryMessages.push(msg);map.set(uniqueChatMessageKey(msg),msg);added++;return;}
          const current=map.get(existingKey);
          if(latestDateValue(msg) >= latestDateValue(current)){Object.assign(current,{...current,...msg,syncStatus:"synced"});updated++;}
        });
        const merged=dedupeChatMessages(memoryMessages).sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
        state.chatAdminMessages=merged;
        saveAdminChatBuffers(getAllAdminConversationRows(),merged);
        const meta=readMemory(MEM_KEYS.chatSyncMeta,{});
        writeMemory(MEM_KEYS.chatSyncMeta,{...meta,lastRemotePullAt:now(),lastAdminPullAt:now()});
        return {added,updated,total:merged.length};
      }

      const visitorId=getOfficialChatVisitorId();
      if(!visitorId) return {added:0,updated:0,total:0};
      const allowed=remote.filter(m=>String(m.visitorId||"")===visitorId);
      if(!allowed.length) return {added:0,updated:0,total:chatMessages().filter(m=>m.uiOnly || m.visitorId===visitorId).length};
      const memoryMessages=chatMessages().filter(m=>m.uiOnly || String(m.visitorId||"")===visitorId).slice();
      const map=new Map(memoryMessages.map(m=>[uniqueChatMessageKey(m),m]));
      let added=0, updated=0;
      allowed.forEach(msg=>{
        const keys=[msg.remoteId,msg.id,[msg.visitorId,msg.role,msg.text,msg.createdAt].join("|")].filter(Boolean);
        let existingKey=keys.find(k=>map.has(k));
        if(!existingKey){memoryMessages.push(msg);map.set(uniqueChatMessageKey(msg),msg);added++;return;}
        const current=map.get(existingKey);
        const keepLocalPending=current && current.syncStatus && current.syncStatus!=="synced" && latestDateValue(current) >= latestDateValue(msg);
        if(!keepLocalPending && latestDateValue(msg) >= latestDateValue(current)){Object.assign(current,{...current,...msg,syncStatus:"synced"});updated++;}
      });
      memoryMessages.sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
      saveChatMessages(dedupeChatMessages(memoryMessages),{broadcast:options.broadcast!==false});
      const meta=readMemory(MEM_KEYS.chatSyncMeta,{});
      writeMemory(MEM_KEYS.chatSyncMeta,{...meta,lastRemotePullAt:now(),lastUserPullAt:now()});
      return {added,updated,total:memoryMessages.length};
    }

    function mergeRemoteConversationsIntoLocal(remoteConversations=[]){
      const remote=(Array.isArray(remoteConversations)?remoteConversations:[]).map(remoteConversationToLocal).filter(x=>x?.visitor_id);
      if(!remote.length) return {added:0,updated:0,total:getAdminConversationBuffer().length};
      const map=new Map(getAllAdminConversationRows().map(row=>[row.visitor_id || row.visitorId,row]));
      let added=0, updated=0;
      remote.forEach(row=>{
        const key=row.visitor_id;
        const current=map.get(key);
        if(!current){map.set(key,row);added++;return;}
        if(latestDateValue(row) >= latestDateValue(current)){map.set(key,{...current,...row});updated++;}
      });
      const merged=[...map.values()].sort((a,b)=>new Date(b.last_message_at||b.updated_at||0)-new Date(a.last_message_at||a.updated_at||0));
      saveAdminChatBuffers(merged,getAllAdminChatMessages());
      state.chatAdminConversations=merged;
      const meta=readMemory(MEM_KEYS.chatSyncMeta,{});
      writeMemory(MEM_KEYS.chatSyncMeta,{...meta,lastRemotePullAt:now(),lastAdminPullAt:now()});
      return {added,updated,total:merged.length};
    }

    async function pullChatChangesFromDB(options={}){
      if(!supabaseReady()) return null;
      const sb=supabaseConfig();
      const since=options.since || DataService.getLastPullAt();
      try{
        const isAdminMode=!!options.admin;
        if(isAdminMode && (!isLogged() || !can("chat.manage"))){
          return {conversations:{added:0,updated:0,total:0},messages:{added:0,updated:0,total:0}};
        }
        const visitorId=isAdminMode ? "" : getOfficialChatVisitorId();
        if(!isAdminMode && !visitorId){
          return {conversations:{added:0,updated:0,total:0},messages:{added:0,updated:0,total:userVisibleChatMessages().length}};
        }
        const msgLimit=isAdminMode ? 1000 : 260;
        const msgPath=isAdminMode
          ? `${sb.messagesTable}?select=*&order=created_at.asc&limit=${msgLimit}`
          : `${sb.messagesTable}?visitor_id=eq.${encodeURIComponent(visitorId)}&select=*&order=created_at.asc&limit=${msgLimit}`;
        const convPath=isAdminMode
          ? `${sb.conversationsTable}?select=*&order=last_message_at.desc&limit=240`
          : `${sb.conversationsTable}?visitor_id=eq.${encodeURIComponent(visitorId)}&select=*&order=last_message_at.desc&limit=1`;
        const beforeCount=(isAdminMode?getAllAdminChatMessages():userVisibleChatMessages()).length;
        const [convs,msgs]=await Promise.all([
          supabaseREST(convPath,{method:"GET",headers:{"Prefer":"return=representation"}}).catch(()=>[]),
          supabaseREST(msgPath,{method:"GET",headers:{"Prefer":"return=representation"}}).catch(()=>[])
        ]);
        const convResult=isAdminMode ? mergeRemoteConversationsIntoLocal(convs||[]) : {added:0,updated:0,total:Array.isArray(convs)?convs.length:0};
        const msgResult=mergeRemoteMessagesIntoLocal(msgs||[],{broadcast:false,admin:isAdminMode});
        DataService.setLastPullAt(now());
        const meta=readMemory(MEM_KEYS.chatSyncMeta,{});
        writeMemory(MEM_KEYS.chatSyncMeta,{...meta,lastRemotePullAt:now(),lastPullMode:isAdminMode?"admin":"user",lastPullSince:since||"initial"});
        refreshChatViewsWithoutFullRender({preservePosition:true,forceBottom:(!isAdminMode && userVisibleChatMessages().length>beforeCount && isChatAtBottom()),adminForceBottom:(isAdminMode && getAllAdminChatMessages().length>beforeCount)});
        if(!options.silent) toast({type:"success",title:"DB rafraîchie",message:`${convResult.total} conversation(s), ${msgResult.total} message(s) chargés.`});
        return {conversations:convResult,messages:msgResult};
      }catch(error){
        const meta=readMemory(MEM_KEYS.chatSyncMeta,{});
        writeMemory(MEM_KEYS.chatSyncMeta,{...meta,lastPullError:error.message||String(error),lastPullErrorAt:now()});
        if(!options.silent) toast({type:"warning",title:"Rafraîchissement impossible",message:"Les messages restent disponibles en mémoire locale."});
        DataService.recordError(error);
        return null;
      }
    }

    function normalizeRemoteEntityRecord(row){
      const record = row?.data || row?.payload || row || {};
      if(record.updated_at && !record.updatedAt) record.updatedAt = record.updated_at;
      if(record.created_at && !record.createdAt) record.createdAt = record.created_at;
      return record;
    }

    function mergeRemoteCollectionIntoMemory(entityType, rows=[]){
      if(!entityType || !Array.isArray(rows)) return [];
      const key = MEM_KEYS[entityType];
      if(!key) return [];
      const current = readMemoryArray(key);
      const map = new Map(current.map(item=>[String(item.id || item.record_id || item.visitor_id || uid("local_")), item]));
      rows.map(normalizeRemoteEntityRecord).forEach(record=>{
        const id = String(record.id || record.record_id || record.visitor_id || "");
        if(!id) return;
        const existing = map.get(id);
        const existingTime = new Date(existing?.updatedAt || existing?.updated_at || existing?.createdAt || 0).getTime();
        const remoteTime = new Date(record.updatedAt || record.updated_at || record.createdAt || record.created_at || 0).getTime();
        if(!existing || remoteTime >= existingTime) map.set(id,{...existing,...record});
      });
      const list = [...map.values()].sort((a,b)=>new Date(b.updatedAt||b.updated_at||b.createdAt||0)-new Date(a.updatedAt||a.updated_at||a.createdAt||0));
      writeMemory(key,list);
      appState[entityType]=list;
      return list;
    }

    function getSupabaseClient(){

      const key=sb.publishableKey || sb.anonKey;

      });

    function realtimePayloadToLocal(payload){
      const table=payload?.table;
      const record=payload?.new || payload?.record || payload?.old || null;
      const eventType=payload?.eventType || payload?.event || "change";
      return {table,record,event:eventType};
    }

    function startSupabaseRealtime(){
      const sb=supabaseConfig();
      if(!supabaseReady() || !sb.realtimeEnabled){ stopSupabaseRealtime(); return; }
      if(supabaseRealtimeChannel) return;
      const client=getSupabaseClient();
      if(!client){
        state.realtimeStatus="error";
        state.realtimeLastError="Client Supabase JS indisponible. Le rafraîchissement automatique toutes les 12 secondes reste actif.";
        return;
      }
      state.realtimeStatus="connecting";
      state.realtimeLastError="";
      try{
        const channel=client.channel("white-wave-shared-data");
        SHARED_REALTIME_TABLES.forEach(table=>{
          channel.on("postgres_changes",{event:"*",schema:"public",table},payload=>{
            const local=realtimePayloadToLocal(payload);
            appState.lastRealtimeEventAt=now();
            state.realtimeLastEvent=`${table} ${local.event} — ${fmtDateTime(now())}`;
            if(local.record && table===sb.messagesTable) handleRealtimeChatMessage(local);
            else if(local.record && table===sb.conversationsTable) handleRealtimeConversation(local);
            else if(local.record) handleRealtimeAppRecord(local);
          });
        });
        channel.subscribe(status=>{
          state.realtimeStarted=status==="SUBSCRIBED";
          state.realtimeStatus=status==="SUBSCRIBED"?"online":String(status||"connecting").toLowerCase();
          appState.realtimeConnected=state.realtimeStarted;
          if(status==="CHANNEL_ERROR" || status==="TIMED_OUT"){
            state.realtimeLastError="Realtime Supabase indisponible. Le fallback de rafraîchissement DB reste actif.";
          }
        });
        supabaseRealtimeChannel=channel;
      }catch(error){
        state.realtimeStarted=false;
        state.realtimeStatus="error";
        state.realtimeLastError=error.message||String(error);
        DataService.recordError(error);
      }
    }

    function stopSupabaseRealtime(){
      clearInterval(supabaseRealtimeHeartbeat);
      supabaseRealtimeHeartbeat=null;
      const client=getSupabaseClient();
      if(client && supabaseRealtimeChannel){
        try{client.removeChannel(supabaseRealtimeChannel);}catch(error){}
      }
      supabaseRealtimeChannel=null;
      if(supabaseRealtimeSocket){
        try{supabaseRealtimeSocket.close();}catch(error){}
      }
      supabaseRealtimeSocket=null;
      state.realtimeStarted=false;
      state.realtimeStatus="offline";
      appState.realtimeConnected=false;
    }

    function handleRealtimeChatMessage(payload){
      const record=payload?.record;
      if(!record) return;
      const before=chatMessages().length;
      mergeRemoteMessagesIntoLocal([record],{broadcast:false});
      const msg=remoteChatMessageToLocal(record);
      const meta=readMemory(MEM_KEYS.chatSyncMeta,{});
      writeMemory(MEM_KEYS.chatSyncMeta,{...meta,lastRealtimeEventAt:now(),lastRealtimeTable:"messages",lastRealtimeEvent:payload.event||"change"});
      state.realtimeLastEvent=`Message ${payload.event||"change"} — ${fmtDateTime(now())}`;
      const isCurrentVisitor=msg?.visitorId===ensureChatVisitorId();
      const userShouldBottom=isCurrentVisitor && (msg.role==="user" || isChatAtBottom());
      const adminActive=state.chatActiveVisitorId && msg?.visitorId===state.chatActiveVisitorId;

    function handleRealtimeConversation(payload){

      writeMemory(MEM_KEYS.chatSyncMeta,{...meta,lastRealtimeEventAt:now(),lastRealtimeTable:"conversations",lastRealtimeEvent:payload.event||"change"});

      refreshChatViewsWithoutFullRender({preservePosition:true});

    function supabaseHeaders(){
      const sb=supabaseConfig();
      const apiKey = sb.publishableKey || sb.anonKey;
      const authKey = sb.anonKey || sb.publishableKey;
      return {"apikey":apiKey,"Authorization":"Bearer "+authKey,"Content-Type":"application/json","Prefer":"return=minimal"};
    }

    async function supabaseREST(path,options={}){
      const sb=supabaseConfig();
      if(!supabaseReady()) throw new Error("Supabase non configuré");
      const res=await fetch(`${sb.url}/rest/v1/${path}`,{...options,headers:{...supabaseHeaders(),...(options.headers||{})}});
      if(!res.ok){
        const txt=await res.text().catch(()=>"");
        throw new Error(txt || `Erreur Supabase ${res.status}`);
      }
      if(res.status===204) return null;
      return res.json().catch(()=>null);
    }

    function refreshChatOnly({forceBottom=false,preservePosition=false}={}){
      const body=document.getElementById("wwChatBody");
      if(!body) return;
      const wasAtBottom=isChatAtBottom(body);
      const distanceFromBottom=body.scrollHeight-body.scrollTop-body.clientHeight;
      body.innerHTML=renderChatMessagesHTML(userVisibleChatMessages());
      if(forceBottom) body.scrollTop=body.scrollHeight;
      else if(wasAtBottom && !preservePosition && !state.chatSearchOpen) body.scrollTop=body.scrollHeight;
      else body.scrollTop=Math.max(0,body.scrollHeight-body.clientHeight-distanceFromBottom);
      bindChatBodyScroll();
      updateChatScrollLatestVisibility();
      updateChatUnreadBadges();
    }
    function clearChatSearch(){

    function chatSpellFixedText(text){
      let out=String(text||"");
      const fixes={
        "reservasion":"reservation","reserver":"réserver","reservere":"réserver","inscrir":"inscrire",
        "tiket":"ticket","ticke":"ticket","bilet":"billet","qr cod":"qr code","qrcode":"qr code",
        "scane":"scanner","scaner":"scanner","adminn":"admin","whatsap":"whatsapp","vippe":"vip",
        "adress":"adresse","addresse":"adresse","paye":"paiement","paiment":"paiement"
      };
      Object.entries(fixes).forEach(([bad,good])=>{
        out=out.replace(new RegExp(bad,"gi"),good);
      });
      return out;
    }

    function customChatFAQ(){return readMemoryArray(MEM_KEYS.chatCustomFaq).filter(x=>x && x.question && x.answer)}
    function saveCustomChatFAQ(list){writeMemory(MEM_KEYS.chatCustomFaq,(list||[]).slice(-250));markDataDirty("chatCustomFaq","save")}
    function unknownChatQuestions(){return readMemoryArray(MEM_KEYS.chatUnknownQuestions)}
    function saveUnknownChatQuestions(list){writeMemory(MEM_KEYS.chatUnknownQuestions,(list||[]).slice(-250));markDataDirty("chatUnknownQuestions","save")}
    function addUnknownChatQuestion(question,requestType="other",score=0){
      const clean=sanitizeText(question,240);
      if(!clean) return;
      const arr=unknownChatQuestions();
      const key=normalizeText(clean);
      const found=arr.find(x=>normalizeText(x.question)===key && !x.resolved);
      if(found){found.count=(found.count||1)+1;found.updatedAt=now();found.score=score;found.requestType=requestType;saveUnknownChatQuestions(arr);return;}
      arr.unshift({id:uid("uq_"),question:clean,requestType,score,count:1,resolved:false,createdAt:now(),updatedAt:now()});
      saveUnknownChatQuestions(arr);
    }
    function resolveUnknownAsFAQ(id){
      const arr=unknownChatQuestions();
      const item=arr.find(x=>x.id===id);
      if(!item) return;
      askInput("Ajouter une réponse FAQ",`Question : ${item.question}`,"Réponse officielle",value=>{
        const answer=sanitizeText(value,900);
        if(!answer) return toast({type:"warning",title:"Réponse vide",message:"La réponse FAQ ne peut pas être vide."});
        const faqs=customChatFAQ();
        faqs.unshift({id:uid("faq_"),question:item.question,answer,requestType:item.requestType||"other",createdAt:now(),adminLogin:session()?.login||"Admin"});
        saveCustomChatFAQ(faqs);
        item.resolved=true;item.resolvedAt=now();item.answer=answer;
        saveUnknownChatQuestions(arr);
        toast({type:"success",title:"FAQ enrichie",message:"Assistant ww saura répondre à cette question la prochaine fois."});
        render();
      });
    }

    function remainingPlacesForRole(role){
      const c=config();
      const limit=Number(c.limits?.[role]||0);
      if(!limit) return null;
      const used=reservations().filter(r=>r.ticketType===role && r.status!=="cancelled").length + participants().filter(p=>p.role===role && p.scanStatus!=="cancelled").length;
      return Math.max(0,limit-used);
    }

    function answerReservationStatus(){
      const p=chatProfile();
      if(!chatProfileReady()) return "Je peux vérifier ta réservation, mais j’ai d’abord besoin de ton nom et ton numéro dans le bloc d’identification du chat.";
      const phoneDigits=String(p.phone||"").replace(/\D/g,"");
      const matches=reservations().filter(r=>String(r.phone||"").replace(/\D/g,"")===phoneDigits || normalizeText(fullName(r))===normalizeText(p.name));
      if(!matches.length) return `Je n’ai trouvé aucune réservation liée à ${p.name} / ${p.phone}. Pour créer une réservation, tape /reserver. Pour parler à la gestion, tape /admin.`;
      return matches.slice(0,3).map(r=>`Réservation ${r.number} : ${statusLabel(r.status)} • Ticket ${r.ticketType} • ${fmtDateTime(r.createdAt)}`).join("\n");
    }

    function scoreChatIntent(message,item){
      const text=normalizeText(chatSpellFixedText(message));
      const tokens=text.split(/\s+/).filter(w=>w.length>2);
      let score=0;
      [...(item.keys||[]),...(item.examples||[])].forEach(k=>{
        const nk=normalizeText(k);
        if(!nk) return;
        if(text===nk) score+=10;
        else if(text.includes(nk)) score+=6;
        else nk.split(/\s+/).filter(w=>w.length>3).forEach(w=>{if(text.includes(w)) score+=1;});
      });
      tokens.forEach(w=>{
        if(normalizeText(item.category||"").includes(w)) score+=1;
        if(normalizeText(item.intent||"").includes(w)) score+=1;
      });
      return score+(item.confidenceBoost||0);
    }

    function bestChatIntent(question){
      let best=null,score=0;
      chatFAQ().forEach(item=>{
        const s=scoreChatIntent(question,item);
        if(s>score){score=s;best=item;}
      });
      return {best,score};
    }

    function answerChatQuestion(question){
      const fixed=chatSpellFixedText(question);
      const {best,score}=bestChatIntent(fixed);
      const requestType=(best&&best.requestType)||chatRequestType(fixed);
      if(best && score>=CHAT_CONFIDENCE_DIRECT){
        const text=typeof best.answer==="function"?best.answer(fixed):best.answer;
        return {text:withCommandHint(text, requestType),needsAdmin:false,requestType,confidence:"high",intent:best.intent,score};
      }
      if(best && score>=CHAT_CONFIDENCE_CLARIFY){
        const text=typeof best.answer==="function"?best.answer(fixed):best.answer;
        return {text:`Je pense que ta demande concerne : ${best.category}.
${withCommandHint(text, requestType)}

Si ce n’est pas ça, tape /admin pour transmettre à l’équipe White Wave.`,needsAdmin:false,requestType,confidence:"medium",intent:best.intent,score};
      }
      addUnknownChatQuestion(question,requestType,score);
      const c=config();
      return {text:`Je ne suis pas sûr de comprendre ta demande.

Tu peux taper :
/reserver — créer une réservation
/statut — vérifier une réservation
/admin — parler à la gestion
/aide — voir les commandes disponibles

Contact direct : WhatsApp ${c.contactWhatsapp} • Email ${c.contactEmail}.`,needsAdmin:true,requestType,confidence:"low",intent:"unknown",score};
    }

    async function syncSupabaseConversation(profile=chatProfile()){
      if(!supabaseReady()) return null;
      if(!profile?.name || !isRussianPhone(profile.phone)){
        return null;
      }
      profile=await resolveChatProfileIdentity(profile);
      const sb=supabaseConfig();
      const payload={
        visitor_id:profile.visitorId||ensureChatVisitorId(),
        visitor_name:profile.name||null,
        visitor_phone:profile.phone||null,
        visitor_email:profile.email||null,
        status:"open",
        request_type:profile.requestType||"other",
        reservation_id:profile.reservationId||null,
        reservation_number:profile.reservationNumber||null,
        ticket_type:profile.ticketType||null,
        last_message_at:now(),
        updated_at:now()
      };
      const rows=await supabaseREST(`${sb.conversationsTable}?on_conflict=visitor_id`,{
        method:"POST",
        body:JSON.stringify(payload),
        headers:{"Prefer":"resolution=merge-duplicates,return=representation"}
      });
      const row=Array.isArray(rows)?rows[0]:rows;
      const meta=readMemory(MEM_KEYS.chatSyncMeta,{});
      writeMemory(MEM_KEYS.chatSyncMeta,{...meta,profileFingerprint:chatProfileFingerprint(profile),lastConversationSyncAt:now(),conversationId:row?.id||meta.conversationId||""});
      return row;
    }

    async function touchSupabaseConversation(message){
      if(!supabaseReady()) return null;
      const profile=message.visitorId===ensureChatVisitorId()?chatProfile():{
        visitorId:message.visitorId,
        name:message.visitorName||"",
        phone:message.visitorPhone||"",
        email:message.visitorEmail||""
      };
      try{return await syncSupabaseConversation(profile)}catch(e){return null}
    }


    async function syncChatMessage(message){
      if(!supabaseReady()) return false;
      const officialVisitorId=getOfficialChatVisitorId();
      if(!officialVisitorId || message.uiOnly || message.visitorId!==officialVisitorId) return false;
      const profile=chatProfile();
      if(!profile.name || !isRussianPhone(profile.phone)) return false;
      const sb=supabaseConfig();
      const conversation=await touchSupabaseConversation(message);
      const payload={
        local_id:message.id,
        visitor_id:message.visitorId,
        conversation_id:conversation?.id||null,
        sender:message.role,
        body:message.text,
        needs_admin:!!message.needsAdmin,
        parent_local_id:message.parentId||null,
        admin_login:message.adminLogin||null,
        visitor_name:message.visitorName||profile.name||null,
        visitor_phone:message.visitorPhone||profile.phone||null,
        visitor_email:message.visitorEmail||profile.email||null,
        request_type:message.requestType||chatRequestType(message.text),
        message_status:message.status||"sent",
        reservation_id:message.reservationId||null,
        reservation_number:message.reservationNumber||null,
        created_at:message.createdAt,
        updated_at:message.updatedAt||message.createdAt||now(),
        sync_status:"synced"
      };
      try{
        try{
          await supabaseREST(`${sb.messagesTable}?on_conflict=local_id`,{method:"POST",body:JSON.stringify(payload),headers:{"Prefer":"resolution=merge-duplicates,return=minimal"}});
        }catch(columnError){
          if(/updated_at|sync_status|column/i.test(String(columnError.message||columnError))){
            const legacyPayload={...payload};
            delete legacyPayload.updated_at;
            delete legacyPayload.sync_status;
            await supabaseREST(`${sb.messagesTable}?on_conflict=local_id`,{method:"POST",body:JSON.stringify(legacyPayload),headers:{"Prefer":"resolution=merge-duplicates,return=minimal"}});
          }else throw columnError;
        }
        const msgs=chatMessages();
        const targetMessage=msgs.find(m=>m.id===message.id && m.visitorId===officialVisitorId);
        if(targetMessage){targetMessage.syncStatus="synced";saveChatMessages(msgs,{broadcast:false});}
        return true;
      }catch(err){
        const msgs=chatMessages();
        const targetMessage=msgs.find(m=>m.id===message.id && m.visitorId===officialVisitorId);
        if(targetMessage){targetMessage.syncStatus="pending";saveChatMessages(msgs,{broadcast:false});}
        DataService.recordError(err);
        return false;
      }
    }

    async function syncPendingChatMessages(){
      const visitorId=getOfficialChatVisitorId();
      if(!supabaseReady() || state.chatSyncing || !visitorId) return;
      state.chatSyncing=true;
      const pending=chatMessages().filter(m=>m.visitorId===visitorId && !m.uiOnly && (m.syncStatus==="pending" || (m.syncStatus==="memory" && m.role!=="system"))).slice(0,CHAT_SUPABASE_BATCH_LIMIT);
      for(const msg of pending) await syncChatMessage(msg);
      state.chatSyncing=false;
    }

    function normalizeCommandText(text){
      return String(text||"")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[̀-ͯ]/g,"");
    }

    function isReservationStartCommand(text){
      const n=normalizeCommandText(text);
      return n==="/reserver" || n==="/reservation" || n==="/ticket";
    }

    function isReservationTrigger(text){
      // Ancienne détection automatique remplacée : une réservation démarre uniquement par commande exacte.
      return isReservationStartCommand(text);
    }

    function parseChatCommand(text){
      const n=normalizeCommandText(text);
      const commands={
        "/reserver":"start_reservation",
        "/reservation":"start_reservation",
        "/ticket":"start_reservation",
        "/statut":"check_status",
        "/admin":"contact_admin",
        "/annuler":"cancel_reservation",
        "/recommencer":"restart_reservation",
        "/aide":"help",
        "/etat":"reservation_state",
        "/confirmer":"confirm_reservation"
      };
      if(commands[n]) return {type:commands[n],raw:text};
      if(n.startsWith("/modifier ")) return {type:"edit_reservation_field",field:n.replace("/modifier ","").trim(),raw:text};
      if(n.startsWith("/")) return {type:"unknown_command",raw:text};
      return null;
    }

    function sanitizePersonName(text){

    function isForbiddenNameInput(text){
      const clean=String(text||"").trim();
      const n=normalizeCommandText(clean);
      const forbidden=["ok","oui","non","bonjour","salut","merci","admin","aide","annuler","stop","ticket","reservation","réservation","reserver","réserver","vip","qr","code","scanner","statut","confirmer","modifier","/reserver","/reservation","/ticket","/admin","/aide","/annuler","/statut","/confirmer"];
      if(!n) return true;
      if(n.startsWith("/")) return true;
      if(forbidden.includes(n)) return true;
      if(n.length<2 || n.length>40) return true;
      if(/\d/.test(n)) return true;
      if(/[<>@#$%^*_+=()\[\]{}|\\]/.test(clean)) return true;
      return false;
    }

    function repairExpiredChatReservationDraft(options={}){
      const draft=getChatReservationDraft();
      if(!draft.active || !draft.updatedAt) return false;
      const age=Date.now()-new Date(draft.updatedAt).getTime();
      if(age>30*60*1000){
        resetChatReservationDraft();
        if(!options.silent) toast({type:"info",title:"Réservation expirée",message:"La réservation en cours a expiré après une longue période d’inactivité. Tape /reserver pour recommencer."});

    function parseChatReservationField(field,value,draft){
      const text=sanitizeText(value,160);
      if(field==="lastName" || field==="firstName"){
        if(isForbiddenNameInput(text)) return {ok:false,error:"Cette réponse ne ressemble pas à un nom. Écris uniquement le nom/prénom attendu, ou tape /aide."};
        return {ok:true,value:sanitizePersonName(text)};
      }
      if(field==="gender"){
        const n=normalizeText(text);
        if(["h","homme","masculin","m"].includes(n)) return {ok:true,value:"Homme"};
        if(["f","femme","feminin","féminin"].includes(n)) return {ok:true,value:"Femme"};
        if(["autre","other"].includes(n)) return {ok:true,value:"Autre"};
        return {ok:false,error:"Réponds par Homme, Femme ou Autre."};
      }
      if(field==="phone"){
        const phone=normalizeRussianPhone(text);
        if(!isRussianPhone(phone)) return {ok:false,error:"Numéro invalide. Utilise un numéro russe qui commence par +7 ou 8."};
        return {ok:true,value:phone};
      }
      if(field==="email"){
        if(!text || /^(passer|skip|non|aucun)$/i.test(normalizeText(text))) return {ok:true,value:""};
        if(!isValidEmail(text)) return {ok:false,error:"Email optionnel : écris une adresse valide ou PASSER."};
        return {ok:true,value:text};
      }
      if(field==="ticketType"){
        const found=activePublicRoles().find(r=>normalizeText(r)===normalizeText(text));
        if(!found) return {ok:false,error:`Ticket invalide. Choisis : ${activePublicRoles().join(', ')}.`};
        return {ok:true,value:found};
      }
      if(field==="confirm"){
        if(normalizeCommandText(text)==="/confirmer") return {ok:true,value:"yes"};
        return {ok:false,error:"Pour confirmer ta réservation, tape exactement /confirmer. Pour modifier un champ, tape /modifier nom, /modifier prenom, /modifier telephone, /modifier email ou /modifier ticket. Pour annuler, tape /annuler."};
      }
      return {ok:true,value:text};
    }
    function chatReservationSummary(data){
      return `Récapitulatif de ta réservation :\nNom : ${data.lastName||'—'}\nPrénom : ${data.firstName||'—'}\nSexe : ${data.gender||'—'}\nTéléphone : ${data.phone||'—'}\nEmail : ${data.email||'—'}\nTicket : ${data.ticketType||'—'}`;
    }
    async function handleChatReservationAnswer(text){
      repairExpiredChatReservationDraft({silent:true});
      const draft=getChatReservationDraft();
      const field=CHAT_RESERVATION_FIELDS[draft.step]||"lastName";
      const parsed=parseChatReservationField(field,text,draft);
      if(!parsed.ok) return {text:parsed.error+`

`+chatReservationQuestion(field),needsAdmin:false,done:false,requestType:"reservation"};
      if(field==="confirm"){
        const data={...(draft.data||{})};
        resetChatReservationDraft();
        const result=createReservationRecord(data,{silent:true,source:"chat",visitor:chatProfile(),strict:true});
        if(!result.ok) return {text:`Je n’ai pas pu créer la réservation : ${result.message}
Tu peux corriger l’information ou contacter un admin avec /admin.`,needsAdmin:true,done:true,requestType:"reservation"};
        try{
          await result.savePromise;
          await syncSupabaseConversation({...chatProfile(),reservationId:result.reservation.id,reservationNumber:result.reservation.number,ticketType:result.reservation.ticketType});
        }catch(error){
          const rollback=allReservationsRaw().filter(x=>x.id!==result.reservation.id);
          writeMemory(MEM_KEYS.reservations,rollback);appState.reservations=rollback;
          DataService.recordError(error);
          return {text:"La réservation n’a pas été confirmée en base de données. Vérifie ta connexion ou contacte la gestion avec /admin.",needsAdmin:true,done:true,requestType:"reservation"};
        }
        return {text:`Réservation confirmée ✅

Numéro : ${result.reservation.number}
Nom : ${result.reservation.lastName||data.lastName||"—"} ${result.reservation.firstName||data.firstName||""}
Ticket : ${result.reservation.ticketType||data.ticketType||"—"}

L’équipe White Wave pourra maintenant vérifier ta demande dans l’espace admin.

Tu peux taper /statut pour vérifier l’état de ta réservation.`,needsAdmin:false,done:true,requestType:"reservation",reservationId:result.reservation.id,reservationNumber:result.reservation.number};
      }
      const updated={...draft,data:{...(draft.data||{}),[field]:parsed.value},updatedAt:now()};
      if(updated.editingField){
        delete updated.editingField;
        updated.step=CHAT_RESERVATION_FIELDS.indexOf("confirm");
        saveChatReservationDraft(updated);
        return {text:chatReservationSummary(updated.data)+`

`+chatReservationQuestion("confirm"),needsAdmin:false,done:false,requestType:"reservation"};
      }
      updated.step+=1;
      saveChatReservationDraft(updated);
      const nextField=CHAT_RESERVATION_FIELDS[updated.step];
      if(nextField==="confirm") return {text:chatReservationSummary(updated.data)+`

`+chatReservationQuestion("confirm"),needsAdmin:false,done:false,requestType:"reservation"};
      return {text:chatReservationQuestion(nextField),needsAdmin:false,done:false,requestType:"reservation"};
    }

            reservationId:seed.reservation_id||seed.reservationId||"",
            remoteConversationId:seed.id||seed.remoteId||"",
            conversationId:seed.conversation_id||seed.conversationId||seed.id||seed.remoteId||"",
            remoteId:seed.remoteId||seed.id||"",
            identity_confirmed:seed.identity_confirmed ?? seed.identityConfirmed,
            archived:!!seed.archived,
            deleted:!!seed.deleted,
            uiOnly:!!seed.uiOnly
          });
        }
        return map.get(id);
      };

      (Array.isArray(conversationRows)?conversationRows:[]).forEach(row=>{
        const id=row.visitor_id||row.visitorId;
        if(id) ensureGroup(id,row);
      });

      (Array.isArray(messages)?messages:[]).map(normalizeChatMessage).forEach(m=>{
        const id=m.visitorId||ensureChatVisitorId();
        const g=ensureGroup(id,m);
        if(!g.messages.some(x=>x.id===m.id || (m.remoteId && x.remoteId===m.remoteId))) g.messages.push(m);
        if(new Date(m.createdAt)>new Date(g.lastAt)) g.lastAt=m.createdAt;
        if(m.visitorName) g.name=m.visitorName;
        if(m.visitorPhone) g.phone=m.visitorPhone;
        if(m.visitorEmail) g.email=m.visitorEmail;
        if(m.reservationNumber) g.reservationNumber=m.reservationNumber;
        if(m.reservationId) g.reservationId=m.reservationId;
        if(m.role==="user") g.unread++;
        if(m.role==="assistant" && m.needsAdmin) g.pending++;
        if(m.requestType && m.requestType!=="other") g.type=m.requestType;
      });

      return [...map.values()].map(g=>{
        g.messages.sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt));
        const computedType=g.messages.length?conversationType(g):(g.type||"other");
        return {...g,type:computedType,unreadNow:chatConversationUnread(g.messages,g.visitorId)};
      }).sort((a,b)=>new Date(b.lastAt)-new Date(a.lastAt));
    }

    function updateCountdown(){
      const el=document.getElementById("countdown");
      if(!el) return;
      const c=config();
      const target=new Date(`${c.eventDate}T${c.eventTime||"00:00"}:00`).getTime();
      const diff=Math.max(0,target-Date.now());
      const d=Math.floor(diff/86400000);
      const h=Math.floor((diff%86400000)/3600000);
      const m=Math.floor((diff%3600000)/60000);
      const s=Math.floor((diff%60000)/1000);
      const values=[d,h,m,s].map(v=>String(v).padStart(2,"0"));
      [...el.querySelectorAll("strong")].forEach((node,i)=>node.textContent=values[i]);
      if(diff>0) setTimeout(updateCountdown,1000);
    }

    function adminTabs(){
      return [
        ["reservations","📋 Réservations"],
        ["participants","🎫 Participants"],
        ["generate","✨ Générer badge"],
        ...(can("badges.scan")?[["scanner","📷 Scanner"]]:[]),
        ...(can("chat.manage")?[["chat",`💬 Chat${chatAdminUnreadCount()?` <span class="notify-dot">${chatAdminUnreadCount()}</span>`:""}`]]:[]),
        ...(can("admins.manage")?[["admins","👤 Admins"]]:[]),
        ...(can("settings.manage")?[["settings","⚙️ Paramètres"]]:[])
      ];
    }

    function setAdminTab(tab){
      const allowed=new Set(adminTabs().map(([key])=>key));
      state.adminTab=allowed.has(tab)?tab:"reservations";
      render();
    }

    function renderAdminTabContent(){
      if(state.adminTab === "reservations") return adminReservations();
      if(state.adminTab === "participants") return adminParticipants();
      if(state.adminTab === "generate") return adminGenerate();
      if(state.adminTab === "scanner" && can("badges.scan")) return renderAdminScanner();
      if(state.adminTab === "chat" && can("chat.manage")) return adminChat();
      if(state.adminTab === "admins" && can("admins.manage")) return adminAdmins();
      if(state.adminTab === "settings" && can("settings.manage")) return adminSettings();
      state.adminTab = "reservations";
      return adminReservations();
    }

    function stat(icon,value,label){return `<div class="card glass"><div class="stat"><div class="stat-icon">${icon}</div><div><strong>${value}</strong><span>${esc(label)}</span></div></div></div>`}
    function chartLine(label,value,total){
      const pct=Math.min(100,Math.round((value/Math.max(1,total))*100));
      return `<div class="chart-row"><div class="chart-head"><span>${esc(label)}</span><span>${value} • ${pct}%</span></div><div class="chart-bar"><span style="width:${pct}%"></span></div></div>`;
    }
    function getStats(){
      const rs=reservations(), ps=participants();
      const today=new Date().toISOString().slice(0,10);
      const byRole={}; Object.keys(roles).forEach(r=>byRole[r]=0);
      rs.forEach(r=>byRole[r.ticketType]=(byRole[r.ticketType]||0)+1);
      ps.forEach(p=>byRole[p.role]=(byRole[p.role]||0)+1);
      return {
        reservations:rs.length,
        participants:ps.length,
        unnotified:rs.filter(r=>!r.notified).length,
        scanned:ps.filter(p=>p.scanStatus==="scanned").length,
        pending:rs.filter(r=>r.status==="pending").length,
        confirmed:rs.filter(r=>r.status==="confirmed").length,
        todayReservations:rs.filter(r=>String(r.createdAt).slice(0,10)===today).length,
        todayBadges:ps.filter(p=>String(p.createdAt).slice(0,10)===today).length,
        conversion:rs.length?Math.round((ps.filter(p=>p.sourceReservationId).length/rs.length)*100):0,
        byRole,
        totalRole:Object.values(byRole).reduce((a,b)=>a+b,0)
      };
    }

    function reservationStatusOptions(current){
      const map={pending:"En attente",contacted:"Contacté",confirmed:"Confirmé",badge_generated:"Badge généré",cancelled:"Annulé"};
      return Object.entries(map).map(([k,v])=>`<option value="${k}" ${current===k?"selected":""}>${v}</option>`).join("");
    }

    function filterReservations(){
      const validStatuses=["pending","contacted","confirmed","badge_generated","cancelled"];
      const sf=validStatuses.includes(state.reservationStatusFilter)?state.reservationStatusFilter:"all";
      return reservations().filter(r=>{
        return matchSearch(r,state.reservationQuery,[
            x=>x.number,x=>x.firstName,x=>x.lastName,x=>x.phone,x=>x.email,x=>x.ticketType,x=>x.status,x=>x.notes
          ])
          && (state.reservationRoleFilter==="all"||r.ticketType===state.reservationRoleFilter)
          && (sf==="all"||r.status===sf)
          && (state.reservationGenderFilter==="all"||r.gender===state.reservationGenderFilter)
          && (state.reservationNotifiedFilter==="all"||(state.reservationNotifiedFilter==="yes"?r.notified:!r.notified))
          && (!state.dateFilter||String(r.createdAt).slice(0,10)===state.dateFilter);
      });
    }

    function bindForms(){
      bindSubmittedValidation();

      const reservationForm=document.getElementById("reservationForm");
      if(reservationForm) reservationForm.onsubmit=async e=>{
        e.preventDefault(); reservationForm.classList.add("submitted");
        const btn=document.getElementById("reservationSubmitBtn");
        if(!reservationForm.checkValidity()) return toast({type:"warning",title:"Formulaire à corriger",message:"Vérifie les champs obligatoires, le téléphone, l’email s’il est renseigné, et le consentement."});
        const d=Object.fromEntries(new FormData(reservationForm).entries());
        setButtonLoading(btn,true,"Envoi sécurisé");
        const ok=await createReservation(d);
        setButtonLoading(btn,false);
        if(!ok) return;
      };

      const loginForm=document.getElementById("loginForm");
      if(loginForm) loginForm.onsubmit=async e=>{
        e.preventDefault(); loginForm.classList.add("submitted");
        const status=document.getElementById("loginStatus");
        const btn=document.getElementById("loginSubmitBtn");
        if(status){status.className="auth-status";status.textContent=""}
        if(!loginForm.checkValidity()) return;
        const d=Object.fromEntries(new FormData(loginForm).entries());
        const id=d.identity.trim();
        const lock=adminLoginLockInfo(id);
        if(lock.locked){
          if(status){status.className="auth-status show error";status.textContent=`Trop de tentatives. Réessaie dans ${lock.remaining} seconde(s).`}
          return;
        }
        setButtonLoading(btn,true,"Vérification sécurisée");
        if(status){status.className="auth-status show";status.textContent="Vérification des identifiants en cours…"}
        await delay(350);
        const admin=admins().find(a=>a.active && adminMatchesIdentity(a,id));
        const ok=admin && await verifyPassword(admin,d.password);
        if(!ok){
          const attempt=recordAdminLoginFailure(id);
          setButtonLoading(btn,false);
          const lockMsg=attempt.lockedUntil?" Trop de tentatives : accès bloqué temporairement pendant 5 minutes.":` Tentatives restantes : ${Math.max(0,ADMIN_MAX_LOGIN_ATTEMPTS-Number(attempt.count||0))}.`;
          if(status){status.className="auth-status show error";status.textContent="Identifiant ou mot de passe incorrect."+lockMsg}
          addLog("login_failed","Tentative de connexion refusée",d.identity);
          return;
        }
        clearAdminLoginFailures(id);
        try{ await createAdminPersistentSession(admin); }
        catch(error){
          DataService.recordError(error);
          const expiresAt=new Date(Date.now()+SESSION_TTL_MS).toISOString();
          const sessionData={loggedIn:true,adminId:admin.id,login:admin.login,role:admin.role,createdAt:now(),lastActive:now(),expiresAt};
          writePersistentAdminSession(sessionData);
          toast({type:"warning",title:"Session locale seulement",message:"Supabase n’a pas confirmé la session persistante admin. Le rechargement peut rester limité selon le navigateur."});
        }
        addLog("login","Nouvelle connexion gestionnaire",admin.login);
        if(status){status.className="auth-status show success";status.textContent="Connexion validée. Ouverture du tableau de bord…"}
        toast({type:"success",title:"Connexion réussie",message:`Bienvenue ${admin.login}, l’espace gestionnaire est prêt.`});
        setButtonLoading(btn,false);
        nav("admin");
      };

      const manual=document.getElementById("manualScanForm");
      if(manual) manual.onsubmit=async e=>{
        e.preventDefault(); manual.classList.add("submitted");
        if(!manual.checkValidity()) return;
        const input=document.getElementById("manualScanInput") || manual.querySelector('[name="hash"]');
        const h=String(new FormData(manual).get("hash")||input?.value||"").trim();
        await handleAdminScanValue(h);
        input?.focus();
      };

      const imageScanForm=document.getElementById("imageScanForm");
      if(imageScanForm) imageScanForm.onsubmit=async e=>{
        e.preventDefault(); imageScanForm.classList.add("submitted");
        if(!imageScanForm.checkValidity()) return;
        const file=imageScanForm.qrImage.files[0];
        if(!("BarcodeDetector" in window)){
          toast({type:"warning",title:"Analyse image indisponible",message:"Ce navigateur ne permet pas de lire un QR depuis une image. Utilise le champ manuel."});
          return;
        }
        try{
          const bitmap=await createImageBitmap(file);
          const detector=new BarcodeDetector({formats:["qr_code"]});
          const codes=await detector.detect(bitmap);
          if(!codes.length){toast({type:"warning",title:"QR non détecté",message:"Aucun QR code lisible dans cette image."});return}
          await handleAdminScanValue(codes[0].rawValue);
        }catch(err){
          toast({type:"error",title:"Analyse impossible",message:err.message||"Impossible d’analyser cette image."});
        }
      };

      const badgeForm=document.getElementById("adminBadgeForm");
      if(badgeForm) badgeForm.onsubmit=async e=>{
        e.preventDefault(); badgeForm.classList.add("submitted");
        if(!badgeForm.checkValidity()) return;
        if(!requirePerm("badges.generate")) return;
        const fd=new FormData(badgeForm);
        const d=Object.fromEntries(fd.entries());
        const file=fd.get("avatar");
        if(file && file.size) d.avatar=await fileToDataURL(file);
        askConfirm("Confirmer la génération du badge ?",`Créer un badge ${d.role} pour ${d.firstName} ${d.lastName}.`,async ()=>{
          const result=await createParticipant(d,null,{openAfterCreate:true});
          if(!result?.ok){
            toast({type:"error",title:"Badge non généré",message:"La création du participant n’a pas été confirmée par Supabase. Vérifie la table ww_participants et les dernières erreurs de Maintenance."});
          }
        });
      };

      const adminForm=document.getElementById("adminCreateForm");
      if(adminForm) adminForm.onsubmit=e=>{
        e.preventDefault(); adminForm.classList.add("submitted");
        if(!adminForm.checkValidity()) return;
        if(!requirePerm("admins.manage")) return;
        if(!state.adminsUnlocked){toast({type:"warning",title:"Zone protégée",message:"Déverrouille d’abord la liste admin avec la master key avant de créer un accès gestion."});return}
        const d=Object.fromEntries(new FormData(adminForm).entries());
        if(!isStrongPassword(d.password)){toast({type:"warning",title:"Mot de passe trop faible",message:"Utilise au moins 8 caractères avec majuscule, minuscule, chiffre et caractère spécial."});return}
        askInput("Confirmation de création admin","Ressaisis le mot de passe du nouveau compte pour confirmer.","Mot de passe",value=>{
          if(value!==d.password){toast({type:"error",title:"Confirmation incorrecte",message:"Le mot de passe ressaisi ne correspond pas."});return}
          askConfirm("Confirmer la création admin ?",`Créer le compte ${d.login}.`,()=>createAdmin(d));
        },{inputType:"password"});
      };

      const settingsForm=document.getElementById("settingsForm");
      if(settingsForm) settingsForm.onsubmit=e=>{
        e.preventDefault(); settingsForm.classList.add("submitted");
        if(!requirePerm("settings.manage")) return;
        const fd=new FormData(settingsForm);
        const d=Object.fromEntries(fd.entries());
        const supabase={
          enabled:fd.get("supabaseEnabled")==="on",
          url:String(d.supabaseUrl||"").trim(),
          publishableKey:String(d.supabasePublishableKey||"").trim(),
          anonKey:String(d.supabaseAnonKey||"").trim(),
          conversationsTable:String(d.supabaseConversationsTable||"ww_chat_conversations").trim(),

    async function saveAvatarIndexedDB(id,dataUrl){

    function compressAvatar(file, participantId=null){
      return new Promise((resolve,reject)=>{
        const reader=new FileReader();
        reader.onerror=reject;
        reader.onload=()=>{
          const img=new Image();
          img.onload=async ()=>{
            const canvas=document.createElement("canvas");
            canvas.width=300; canvas.height=300;
            const ctx=canvas.getContext("2d");
            const size=Math.min(img.width,img.height);
            const sx=(img.width-size)/2, sy=(img.height-size)/2;
            ctx.drawImage(img,sx,sy,size,size,0,0,300,300);
            let quality=.85;
            let dataUrl=canvas.toDataURL("image/jpeg",quality);
            while(dataUrl.length>100000 && quality>.40){
              quality-=.15;
              dataUrl=canvas.toDataURL("image/jpeg",quality);
            }
            await saveAvatarIndexedDB(participantId?("participant_"+participantId):("avatar_"+Date.now()+"_"+Math.random().toString(36).slice(2)),dataUrl);
            resolve(dataUrl);
          };
          img.onerror=reject;
          img.src=reader.result;
        };
        reader.readAsDataURL(file);
      });
    }

      const used=participants().filter(p=>p.role===role && p.scanStatus!=="cancelled").length;
      const limit=Number(c.limits?.[role]||0);
      if(limit && used>=limit){
        if(!opts.silent) toast({type:"error",title:"Quota atteint",message:`Le quota des badges ${role} est déjà atteint.`});
        return {ok:false,reason:"limit"};
      }
      const p=normalizeParticipantForSupabase({
        id:uid("p_"),firstName,lastName,gender:d.gender||"—",phone:d.phone||"",email:d.email||"",role,
        avatar:d.avatar||"",badgeCode:badgeCode(),serial:serialNumber(),
        scanStatus:"not_scanned",scannedAt:null,scannedBy:null,
        sourceReservationId:reservationId||null,reissuedFromId:opts.reissueFromId||null,createdAt:now(),updatedAt:now(),deleted:false,version:1
      });
      let confirmedParticipant;
      try{
        confirmedParticipant=await createParticipantStrict(p);
      }catch(error){
        DataService.recordError(error);
        if(!opts.silent) toast({type:"error",title:"Badge non enregistré",message:`Supabase a refusé ww_participants : ${String(error?.message||error).slice(0,180)}`});
        return {ok:false,reason:"participant_db_error",error,participant:p};
      }
      if(reservationId){
        try{
          await updateReservationStrict(reservationId,{badgeGenerated:true,linkedParticipantId:confirmedParticipant.id,status:"badge_generated",version:(reservations().find(r=>r.id===reservationId)?.version||1)+1});
        }catch(error){
          DataService.recordError(error);
          await updateParticipantStrict(confirmedParticipant.id,{scanStatus:"cancelled",cancelReason:"Réservation non liée",updatedAt:now(),version:(confirmedParticipant.version||1)+1}).catch(e=>DataService.recordError(e));
          if(!opts.silent) toast({type:"error",title:"Badge non lié",message:`Participant créé mais réservation non liée : ${String(error?.message||error).slice(0,160)}`});
          return {ok:false,reason:"reservation_link_db_error",error,participant:confirmedParticipant};
        }
      }
      await addLog(opts.reissueFromId?"badge-reissue":"badge",`${opts.reissueFromId?"Badge réédité":"Badge généré"} : ${fullName(confirmedParticipant)}`,session()?.login);
      if(!opts.silent && opts.openAfterCreate!==false){
        state.adminTab="participants"; state.selected={type:"participant",id:confirmedParticipant.id}; state.modal=null;
        toast({type:"success",title:"Badge prêt",message:`Le badge ${confirmedParticipant.badgeCode} de ${fullName(confirmedParticipant)} a été confirmé par Supabase.`});
        render();
      }
      return {ok:true,reason:"created",participant:confirmedParticipant};
    }

        function badgeCode(){

    async function ensureGeneratedReservationsAreParticipants(options={}){
      if(!supabaseReady()) return {created:0,linked:0,failed:0,skipped:0};
      let created=0,linked=0,failed=0,skipped=0;
      const candidates=reservations().filter(r=>!r.deleted && r.status==="badge_generated" && (!r.linkedParticipantId || !participants().some(p=>p.id===r.linkedParticipantId && p.scanStatus!=="cancelled")));
      for(const r of candidates){
        const result=await createParticipant({firstName:r.firstName,lastName:r.lastName,gender:r.gender,phone:r.phone,email:r.email,role:r.ticketType},r.id,{silent:true,openAfterCreate:false,linkExisting:true});
        if(result.ok && result.reason==="created") created++;
        else if(result.ok && result.reason==="linked_existing") linked++;
        else if(result.ok) linked++;
        else {failed++;DataService.recordError(new Error(`Réservation badge_generated non transformée en participant : ${r.number||r.id}`));}
      }
      if(!options.silent && (created||linked||failed)){
        toast({type:failed?"warning":"success",title:"Synchronisation participants",message:`${created} créé(s), ${linked} lié(s), ${skipped} ignoré(s), ${failed} échec(s).`});
      }
      if(created||linked) {
        await DataService.loadCollection("participants").catch(error=>DataService.recordError(error));
        await DataService.loadCollection("reservations").catch(error=>DataService.recordError(error));
      }
      return {created,linked,failed,skipped};
    }

    async function findParticipantByScanValue(scanValue){
      const hash=extractHash(scanValue);
      if(!hash) return null;
      let participant=findParticipantByHash(hash);
      if(participant) return participant;
      if(supabaseReady()){

    async function validateEntry(id, force=false){

    await DataService.loadCollection("participants");
    p=participants().find(x=>x.id===id);
  }
  if(!p) return toast({type:"error",title:"Badge introuvable",message:"Ce badge n’existe pas dans la base Supabase chargée."});
  if(p.scanStatus==="cancelled"){
    state.lastScanResult={type:"bad",title:"Badge annulé",message:"Ce badge n’est plus valide.",participant:null};
    toast({type:"error",title:"Badge annulé",message:"Ce badge n’est plus valide et ne peut pas être scanné."});

  if(p.scanStatus==="scanned" && !force){
    askConfirm("Badge déjà scanné",`Le badge de ${fullName(p)} a déjà été validé. Confirmer une nouvelle validation ?`,async ()=>{await validateEntry(id,true)});
    return;
  }
  const scannedBy=session()?.login||"Agent";
  const log={id:uid("scan_"),participantId:p.id,badgeCode:p.badgeCode,admin:scannedBy,scannedBy,createdAt:now(),status:"scanned",message:"Entrée validée"};
  try{
    const confirmed=await updateParticipantStrict(p.id,{scanStatus:"scanned",scannedAt:now(),scannedBy,version:(p.version||1)+1});
    await createScanLogStrict(log);
    await addLog("scan","Entrée validée : "+fullName(confirmed),scannedBy);
    state.lastScanResult={type:"ok",title:"Badge valide",message:`Entrée autorisée pour ${fullName(confirmed)}.`,participant:confirmed};
    beep();
    toast({type:"success",title:"Entrée validée",message:`${fullName(confirmed)} est confirmé(e) dans Supabase.`});
    refreshAdminScanResult();
  }catch(error){
    state.lastScanResult={type:"bad",title:"Scan non enregistré",message:String(error?.message||error).slice(0,180),participant:p};
    toast({type:"error",title:"Scan refusé",message:`Supabase n’a pas confirmé le scan : ${String(error?.message||error).slice(0,160)}`});
    refreshAdminScanResult();
  }
}

    function bulkGenerateBadges(){
      if(!requirePerm("badges.generate"))return;
      const ids=[...state.selectedReservationIds];
      const source=(ids.length?reservations().filter(r=>ids.includes(r.id)):filterReservations()).filter(r=>!r.deleted && r.status!=="cancelled");
      if(!source.length) return toast({type:"warning",title:"Aucune réservation éligible",message:"Sélectionne des réservations ou garde un filtre contenant au moins une réservation active."});
      askConfirm("Générer les badges",`${source.length} réservation(s) seront traitées. Les badges existants seront liés automatiquement, les réservations déjà liées seront ignorées.`,async ()=>{
        let created=0, linked=0, skipped=0, failed=0, quota=0;
        for(const r of source){
          if(r.linkedParticipantId){skipped++; continue;}
          const result=await createParticipant({firstName:r.firstName,lastName:r.lastName,gender:r.gender,phone:r.phone,email:r.email,role:r.ticketType},r.id,{silent:true,openAfterCreate:false,linkExisting:true});
          if(result.ok && result.reason==="created") created++;
          else if(result.ok && result.reason==="linked_existing") linked++;
          else if(result.reason==="limit") quota++;
          else failed++;
        }
        state.selectedReservationIds.clear();
        addLog("bulk",`Génération badges : ${created} créé(s), ${linked} lié(s), ${quota} quota, ${skipped} déjà lié(s), ${failed} échec(s)`);
        toast({type:created||linked?"success":"warning",title:"Traitement terminé",message:`${created} badge(s) créé(s) • ${linked} badge(s) lié(s) • ${quota} quota atteint • ${skipped} déjà lié(s) • ${failed} échec(s).`});
        render();
      })
    }

    function ticketVerifyUrl(p){
      const base=(location.origin + location.pathname).split("?")[0];
      return base + "#verify?hash=" + encodeURIComponent(ticketHash(p));
    }

    function ticketQrPayload(p){
      const url=ticketVerifyUrl(p);
      if(new TextEncoder().encode(url).length <= 64) return url;
      return ticketHash(p);
    }

    function safeQrPayload(p){
      const payload = ticketQrPayload(p);
      if(new TextEncoder().encode(payload).length <= 64) return payload;
      return ticketHash(p);
    }

    function safeQrSVG(p, scale=4){
      const payload=safeQrPayload(p);
      try{
        const svg=QRCodeMini.createSVG(payload, scale);
        if(svg.includes("<svg") && svg.includes("<rect") && svg.length>100) return svg;
        throw new Error("QR invalide");
      }catch(e){
        console.warn("QR generation failed for",p?.badgeCode,e);
        return QRCodeMini.createSVG("WW:" + String(p?.badgeCode || "INVALID").trim(), scale);
      }
    }

    function safeQrMatrix(p){
      try{
        return QRCodeMini.createMatrix(safeQrPayload(p));
      }catch(e){
        return QRCodeMini.createMatrix("WW:" + String(p.badgeCode || "INVALID").trim());
      }
    }

    function ticketHash(p){
      const code=String(p?.badgeCode||"").trim();
      return code ? "WW:" + code : "";
    }
    function findParticipantByHash(hash){
      const clean=extractHash(hash);
      if(!clean) return null;
      const code=clean.replace(/^WW:/i,"").trim().toUpperCase();
      return participants().find(p=>{
        const badgeCode=String(p.badgeCode||"").trim().toUpperCase();
        const ticket=extractHash(ticketHash(p));
        return badgeCode===code || ticket===clean || extractHash(badgeCode)===clean;
      }) || null;
    }
    function extractHash(input){
      let raw=String(input||"").trim();
      if(!raw) return "";
      try{raw=decodeURIComponent(raw);}catch(_){ }
      try{
        const url=new URL(raw, location.origin);
        const hashText=String(url.hash||"");
        let hashParams=null;
        if(hashText.includes("?")) hashParams=new URLSearchParams(hashText.slice(hashText.indexOf("?")+1));
        const hashParam=url.searchParams.get("hash") || url.searchParams.get("code") || hashParams?.get("hash") || hashParams?.get("code");
        if(hashParam) return extractHash(hashParam);
      }catch(_){ }
      if(raw.includes("hash=") || raw.includes("code=")){
        const query=raw.includes("?") ? raw.split("?").pop() : raw.replace(/^#?\w*\??/,"");
        const params=new URLSearchParams(query);
        const value=params.get("hash") || params.get("code");
        if(value) return extractHash(value);
      }
      raw=raw.trim().replace(/[\s\u0000]+/g,"");
      if(/^WW:/i.test(raw)) return "WW:" + raw.replace(/^WW:/i,"").trim().toUpperCase();
      if(/^WW/i.test(raw)) return "WW:" + raw.replace(/^WW:/i,"").trim().toUpperCase();
      return raw.toUpperCase();
    }

    async function shareBadge(id){
      const p=participants().find(x=>x.id===id); if(!p)return;
      const verifyUrl=ticketVerifyUrl(p);
      try{
        const blob=await svgToPngBlob(buildBadgeSVG(p),3);
        const file=new File([blob],`badge-${safe(p.badgeCode)}.png`,{type:"image/png"});
        if(navigator.canShare && navigator.canShare({files:[file]})){
          await navigator.share({title:`Badge White Wave — ${fullName(p)}`,text:`Badge ${p.role} de ${fullName(p)} — White Wave`,files:[file]});
          toast({type:"success",title:"Partage ouvert",message:"Le badge est prêt à être partagé depuis ton appareil."});
          return;
        }
        if(navigator.share){
          await navigator.share({title:`Badge White Wave — ${fullName(p)}`,text:`Lien de vérification du badge ${p.badgeCode}`,url:verifyUrl});
          toast({type:"success",title:"Lien partagé",message:"Le lien de vérification a été envoyé."});
          return;
        }
        await copyText(verifyUrl);

    async function handleAdminScanValue(value, options={}){
      if(!isLogged() || !can("badges.scan")){
        toast({type:"error",title:"Accès refusé",message:"Le scanner est réservé aux agents autorisés."});
        return null;
      }
      const hash=extractHash(value);
      if(!hash){
        state.lastScanResult={type:"bad",status:"bad",title:"Code vide",message:"Aucun code QR ou badgeCode détecté.",hash:""};
        refreshAdminScanResult();
        return null;
      }
      const participant=await findParticipantByScanValue(hash);
      if(!participant){
        state.lastScanResult={type:"bad",status:"bad",title:"Badge introuvable",message:`Aucun participant trouvé pour : ${hash}`,hash,participant:null};
        if(!options.silent) toast({type:"error",title:"Badge introuvable",message:"Aucun badge correspondant n’a été trouvé dans Supabase."});
        refreshAdminScanResult();
        return null;
      }
      const already=participant.scanStatus==="scanned";
      const cancelled=participant.scanStatus==="cancelled";
      state.lastScanResult={
        type:cancelled?"bad":already?"warn":"ok",
        status:cancelled?"bad":already?"warn":"ok",
        title:cancelled?"Badge annulé":already?"Badge déjà scanné":"Badge reconnu",
        message:cancelled?"Ce badge n’est plus valide.":already?`Ce badge de ${fullName(participant)} a déjà été validé.`:`Badge reconnu pour ${fullName(participant)}.`,
        hash,
        participant,
        participantId:participant.id
      };
      refreshAdminScanResult();
      return participant;
    }
async function startScanner(){
      if(!isLogged() || !can("badges.scan")){
        return toast({type:"error",title:"Accès refusé",message:"Le scanner est réservé aux agents autorisés."});
      }
      const video=document.getElementById("scanVideo"), status=document.getElementById("scanStatus"), fallbackBox=document.getElementById("html5QrReader");
      if(!video && !fallbackBox) return;
      stopScanner(false);
      if(status) status.textContent="Demande d’accès à la caméra…";
      if("BarcodeDetector" in window && navigator.mediaDevices?.getUserMedia && video){
        try{
          if(fallbackBox) fallbackBox.classList.remove("active");
          video.style.display="block";
          state.cameraStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:"environment"}},audio:false});
          video.srcObject=state.cameraStream; await video.play();
          const detector=new BarcodeDetector({formats:["qr_code"]});
          if(status) status.textContent="Caméra active. Place le QR dans le cadre.";
          const scan=async()=>{
            try{
              const codes=await detector.detect(video);
              if(codes.length){
                const value=extractHash(codes[0].rawValue);
                if(value===state.lastScan && Date.now()-state.lastScanAt<2500){state.scanLoop=requestAnimationFrame(scan);return;}
                state.lastScan=value; state.lastScanAt=Date.now();
                beep(); navigator.vibrate?.(120);
                await handleAdminScanValue(value);
              }
            }catch(error){ }
            state.scanLoop=requestAnimationFrame(scan);
          };
          scan();
          return;
        }catch(error){
          DataService.recordError(error);
          stopScanner(false);
          if(status) status.textContent="Caméra native indisponible. Tentative avec le moteur QR mobile…";
        }
      }
      if(window.Html5Qrcode && fallbackBox){
        try{
          video && (video.style.display="none");
          fallbackBox.classList.add("active");
          html5QrScanner=new Html5Qrcode("html5QrReader");
          await html5QrScanner.start(
            {facingMode:"environment"},
            {fps:10,qrbox:{width:240,height:240}},
            async decodedText=>{
              const value=extractHash(decodedText);
              if(value===state.lastScan && Date.now()-state.lastScanAt<2500) return;
              state.lastScan=value; state.lastScanAt=Date.now();
              beep(); navigator.vibrate?.(120);
              await handleAdminScanValue(value);
            },
            ()=>{}
          );
          if(status) status.textContent="Scanner mobile actif. Place le QR dans le cadre.";
          return;
        }catch(error){
          DataService.recordError(error);
          if(status) status.textContent="Lecture caméra indisponible. Utilise le champ manuel.";
          return;
        }
      }
      if(status) status.textContent="Caméra ou moteur QR indisponible. Utilise le champ manuel.";
    }

        ["buildBadgeSVG", typeof buildBadgeSVG(sample)==="string" && buildBadgeSVG(sample).includes("<svg")],
        ["ticketHash", typeof ticketHash(sample)==="string" && ticketHash(sample).length>10],
        ["modalParticipant", typeof renderModal==="function"],
      ];
      return checks.map(([name,ok])=>({name,ok}));
    }


    
    async function logout(){
      const s=session();
      if(s?.login) await addLog("logout","Déconnexion gestionnaire",s.login);
      stopScanner(false);
      await revokeAdminPersistentSession();
      state.adminsUnlocked=false;
      state.selected=null;
      state.modal=null;
      state.lastScanResult=null;
      toast({type:"info",title:"Déconnexion",message:"La session gestionnaire a été fermée correctement."});
      nav("reservation");
    }

    function openLogsModal(){
      state.modal={type:"logs"};
      render();
    }

    function markLogsRead(){
      const l=logs().map(x=>({...x,read:true}));
      saveLogs(l);
      toast({type:"success",title:"Logs marqués comme lus",message:"Toutes les notifications gestionnaire sont maintenant lues."});
      state.modal={type:"logs"};
      render();
    }


    function detectDuplicateChatUsers(){
      const map={};
      readMemoryArray(MEM_KEYS.chatAdminConversationsBuffer).forEach(c=>{const k=normalizePhoneForIdentity(c.visitor_phone||c.visitorPhone||c.phone||""); if(k)(map[k] ||= []).push(c);});
      const dup=Object.entries(map).filter(([,v])=>v.length>1);
      toast({type:dup.length?"warning":"success",title:"Doublons utilisateurs",message:dup.length?`${dup.length} numéro(s) avec plusieurs conversations détecté(s).`:"Aucun doublon évident dans le cache conversations."});
      return dup;
    }
    function detectDuplicateConversations(){
      const groups=getAdminConversationGroups();
      const map={}; groups.forEach(g=>{if(g.visitorId)(map[g.visitorId] ||= []).push(g);});
      const dup=Object.entries(map).filter(([,v])=>v.length>1);
      toast({type:dup.length?"warning":"success",title:"Doublons conversations",message:dup.length?`${dup.length} visitor_id en doublon détecté(s).`:"Aucun doublon conversation visible."});
      return dup;
    }
    function detectCorruptedParticipants(){
      const bad=allParticipantsRaw().filter(p=>!p.id || !p.badgeCode || (p.scannedAt==="") || !p.firstName || !p.lastName);
      toast({type:bad.length?"warning":"success",title:"Participants corrompus",message:bad.length?`${bad.length} participant(s) à vérifier.`:"Aucun participant corrompu détecté."});
      return bad;
    }
    async function cleanInvalidParticipantDates(){
      let ok=0,fail=0;
      for(const p of allParticipantsRaw().filter(x=>x.scannedAt==="" || x.createdAt==="" || x.updatedAt==="")){
        try{await updateParticipantStrict(p.id,{scannedAt:p.scannedAt===""?null:p.scannedAt,createdAt:p.createdAt||now(),updatedAt:p.updatedAt||now()});ok++;}
        catch(error){fail++;recordSupabaseActionError({table:TABLES.participants,action:"cleanInvalidParticipantDates"},error,p);}
      }
      toast({type:fail?"warning":"success",title:"Nettoyage dates",message:`${ok} corrigé(s), ${fail} échec(s).`});
      render();
    }
    async function repairReservationParticipantLinks(){
      let ok=0,fail=0;
      for(const r of reservations().filter(r=>!r.linkedParticipantId)){
        const p=participants().find(p=>p.scanStatus!=="cancelled" && normalizeText(p.firstName)===normalizeText(r.firstName) && normalizeText(p.lastName)===normalizeText(r.lastName) && p.role===r.ticketType);
        if(!p) continue;
        try{await updateReservationStrict(r.id,{linkedParticipantId:p.id,badgeGenerated:true,status:"badge_generated",version:(r.version||1)+1});ok++;}
        catch(error){fail++;recordSupabaseActionError({table:TABLES.reservations,action:"repairReservationParticipantLinks"},error,{reservationId:r.id,participantId:p.id});}
      }
      toast({type:fail?"warning":"success",title:"Liens réservation → participant",message:`${ok} lien(s) réparé(s), ${fail} échec(s).`});
      render();
    }

    function runFullDiagnostics(){
  const sample={id:"diag",firstName:"Test",lastName:"User",gender:"Masculin",role:"VIP",badgeCode:"WW26-DIAG01",serial:"SER-DIAG",scanStatus:"not_scanned",createdAt:now()};
  const checks=[];
  const add=(name,ok,detail)=>checks.push({name,ok:!!ok,detail});
  try{add("Démarrage application",!!document.getElementById("app"),"Conteneur #app disponible")}catch(e){add("Démarrage application",false,e.message)}
  try{add("Stockage réservations",Array.isArray(reservations()),"Lecture des réservations")}catch(e){add("Stockage réservations",false,e.message)}
  try{add("Stockage participants",Array.isArray(participants()),"Lecture des participants")}catch(e){add("Stockage participants",false,e.message)}
  try{add("Fonction unlockAdmins",typeof unlockAdmins==="function","Déverrouillage admin disponible")}catch(e){add("Fonction unlockAdmins",false,e.message)}
  try{add("Fonction toggleAdminActive",typeof toggleAdminActive==="function","Activation/désactivation admin disponible")}catch(e){add("Fonction toggleAdminActive",false,e.message)}
  try{add("Écritures strictes",[createParticipantStrict,updateParticipantStrict,createReservationStrict,updateReservationStrict,createAdminStrict,updateAdminStrict,createScanLogStrict,createLogStrict].every(fn=>typeof fn==="function"),"Fonctions ligne par ligne disponibles")}catch(e){add("Écritures strictes",false,e.message)}
  try{add("Normalisation participant",normalizeParticipantForSupabase({...sample,scannedAt:""}).scannedAt===null,"Dates vides → null")}catch(e){add("Normalisation participant",false,e.message)}
  try{add("Normalisation réservation",!!normalizeReservationForSupabase({firstName:"A",lastName:"B"}).id,"Payload réservation whitelisté")}catch(e){add("Normalisation réservation",false,e.message)}
  try{add("Diagnostic Supabase",typeof recordSupabaseActionError==="function","Erreur table/action/payload disponible")}catch(e){add("Diagnostic Supabase",false,e.message)}
  try{add("Session utilisateur",typeof ensureChatUserAndSession==="function" && typeof restoreUserSessionFromToken==="function","Sessions utilisateur persistantes")}catch(e){add("Session utilisateur",false,e.message)}
  try{add("Session admin",typeof createAdminPersistentSession==="function" && typeof restoreAdminSessionFromToken==="function","Sessions admin persistantes")}catch(e){add("Session admin",false,e.message)}
  try{add("QR court",ticketHash(sample).length<=64,"Payload QR compatible")}catch(e){add("QR court",false,e.message)}
  try{add("Rendu badge",renderBadge(sample).includes("badge-img"),"Template badge rendu")}catch(e){add("Rendu badge",false,e.message)}
  try{add("Scanner",typeof startScanner==="function" && typeof findParticipantByHash==="function","Scanner + vérification disponibles")}catch(e){add("Scanner",false,e.message)}
  return checks;
}

    function runTestsAndShow(){
      const results=runFullDiagnostics();
      state.tests=results;
      state.modal={type:"tests"};
      addLog("tests",`Tests exécutés : ${results.filter(x=>x.ok).length}/${results.length} OK`);
      render();
    }


    function registerOfflineWorker(){
      // V3.2.4 : désactivation volontaire du service worker pendant la stabilisation.
      // Cause du bug : une ancienne version cassée peut rester servie depuis le cache et afficher uniquement le fond.
      if(location.protocol==="file:") return;
      if(window.caches?.keys){
        caches.keys().then(keys=>Promise.all(keys.filter(k=>/^white-wave/i.test(k)).map(k=>caches.delete(k)))).catch(()=>{});
      }
      if(navigator.serviceWorker?.getRegistrations){
        navigator.serviceWorker.getRegistrations().then(regs=>regs.forEach(reg=>reg.unregister().catch(()=>{}))).catch(()=>{});
      }
    }

    function showBootError(error){
      console.error("White Wave boot error:", error);
      const app=document.getElementById("app");
      if(app){
        app.innerHTML=`<main class="container" style="padding-top:40px"><section class="card glass"><h1>⚠️ Erreur de démarrage</h1><p>Le site a rencontré une erreur au chargement, mais l'écran vide a été évité.</p><pre style="white-space:pre-wrap;overflow:auto;background:rgba(2,6,23,.08);padding:14px;border-radius:14px">${esc(error?.message||String(error))}</pre><button class="btn primary" onclick="clearPersistentAdminSession();location.reload()">Réinitialiser la session et recharger</button></section></main>`;
      }
    }
    function bootWhiteWaveApp(){
      try{
        initAppData();
        registerOfflineWorker();
        render();
      }catch(error){
        showBootError(error);
      }
    }
    bootWhiteWaveApp();
  </script>
