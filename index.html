    function toCSV(data){if(!data.length)return"";const keys=Array.from(data.reduce((s,o)=>{Object.keys(o).forEach(k=>s.add(k));return s},new Set()));return [keys.join(";"),...data.map(o=>keys.map(k=>csvCell(o[k])).join(";"))].join("\n")}
    function csvCell(v){const s=typeof v==="object"?JSON.stringify(v):String(v??"");return /[;"\n\r]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s}
    function downloadBackup(){masterConfirm("Sauvegarde complète",()=>{download("white-wave-backup.json",JSON.stringify({config:config(),reservations:allReservationsRaw(),participants:allParticipantsRaw(),admins:allAdminsRaw().map(a=>({...a,password:"***"})),logs:logs(),scanLogs:scanLogs(),exportedAt:now()},null,2),"application/json;charset=utf-8");addLog("backup","Sauvegarde complète téléchargée");toast({type:"success",title:"Sauvegarde créée",message:"La sauvegarde complète a été téléchargée."})})}

    function pushUndo(action,payload){
      const history=getArray("white_wave_undo_history");
      history.unshift({id:uid("undo_"),action,payload,createdAt:now()});
      setJSON("white_wave_undo_history",history.slice(0,10));
    }
    function undoLastAction(){
      const history=getArray("white_wave_undo_history");
      const item=history.shift();
      if(!item){toast({type:"info",title:"Rien à annuler",message:"Aucune action récente à annuler."});return}
      if(item.action==="delete_reservation"){
        const rs=allReservationsRaw();
        const idx=rs.findIndex(r=>r.id===item.payload.id);
        if(idx>=0) rs[idx]=item.payload; else rs.unshift(item.payload);
        saveReservations(rs);
        toast({type:"success",title:"Suppression annulée",message:"La réservation a été restaurée."});
      }
      setJSON("white_wave_undo_history",history);
      render();
    }

    function resetDemo(){masterConfirm("Réinitialisation",()=>askConfirm("Réinitialiser les données ?", "Réservations, participants et logs seront vidés. Le compte White/Wave sera conservé.",()=>{setJSON(LS.reservations,[]);setJSON(LS.participants,[]);setJSON(LS.logs,[]);setJSON(LS.scanLogs,[]);setJSON(LS.config,defaultConfig);setJSON("white_wave_undo_history",[]);state.selectedReservationIds.clear();state.selectedParticipantIds.clear();state.selected=null;state.modal=null;state.benefitsRole=null;state.reservationQuery="";state.participantQuery="";state.reservationPage=1;state.participantPage=1;toast({type:"success",title:"Réinitialisation effectuée",message:"Les données de démonstration ont été vidées avec succès."});render()}))}

    const QRCodeMini=(()=>{const VERSION=4,SIZE=33,DATA=80,EC=20,EXP=new Array(512),LOG=new Array(256);let x=1;for(let i=0;i<255;i++){EXP[i]=x;LOG[x]=i;x<<=1;if(x&256)x^=285}for(let i=255;i<512;i++)EXP[i]=EXP[i-255];function mul(a,b){return a&&b?EXP[LOG[a]+LOG[b]]:0}function genPoly(deg){let p=[1];for(let i=0;i<deg;i++){const n=new Array(p.length+1).fill(0);for(let j=0;j<p.length;j++){n[j]^=p[j];n[j+1]^=mul(p[j],EXP[i])}p=n}return p}function rs(data,deg){const g=genPoly(deg),r=new Array(deg).fill(0);for(const b of data){const f=b^r.shift();r.push(0);for(let i=0;i<deg;i++)r[i]^=mul(g[i+1],f)}return r}function push(a,v,l){for(let i=l-1;i>=0;i--)a.push((v>>>i)&1)}function codewords(text){const bytes=Array.from(new TextEncoder().encode(String(text)));if(bytes.length>64)throw new Error("QR trop long");const bits=[];push(bits,4,4);push(bits,bytes.length,8);bytes.forEach(b=>push(bits,b,8));const cap=DATA*8;push(bits,0,Math.min(4,cap-bits.length));while(bits.length%8)bits.push(0);const d=[];for(let i=0;i<bits.length;i+=8){let b=0;for(let j=0;j<8;j++)b=(b<<1)|bits[i+j];d.push(b)}const pads=[236,17];let pi=0;while(d.length<DATA)d.push(pads[pi++%2]);return d}function createMatrix(text){const data=codewords(text),all=data.concat(rs(data,EC)),m=Array.from({length:SIZE},()=>Array(SIZE).fill(false)),f=Array.from({length:SIZE},()=>Array(SIZE).fill(false));function set(x,y,d,func=true){if(x<0||y<0||x>=SIZE||y>=SIZE)return;m[y][x]=!!d;if(func)f[y][x]=true}funcs(set);format(set,0);const bits=[];all.forEach(c=>push(bits,c,8));let bi=0,up=true;for(let right=SIZE-1;right>=1;right-=2){if(right===6)right--;for(let vert=0;vert<SIZE;vert++){const y=up?SIZE-1-vert:vert;for(let dx=0;dx<2;dx++){const xx=right-dx;if(f[y][xx])continue;let dark=bi<bits.length?bits[bi++]===1:false;if((xx+y)%2===0)dark=!dark;set(xx,y,dark,false)}}up=!up}format(set,0);return m}function funcs(set){finder(set,0,0);finder(set,26,0);finder(set,0,26);for(let i=8;i<SIZE-8;i++){set(i,6,i%2===0);set(6,i,i%2===0)}align(set,26,26);set(8,25,true)}function finder(set,x,y){for(let dy=-1;dy<=7;dy++)for(let dx=-1;dx<=7;dx++){const xx=x+dx,yy=y+dy;if(xx<0||yy<0||xx>=SIZE||yy>=SIZE)continue;const dark=dx>=0&&dx<=6&&dy>=0&&dy<=6&&(dx===0||dx===6||dy===0||dy===6||(dx>=2&&dx<=4&&dy>=2&&dy<=4));set(xx,yy,dark)}}function align(set,cx,cy){for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){const dist=Math.max(Math.abs(dx),Math.abs(dy));set(cx+dx,cy+dy,dist!==1)}}function fb(mask){const ecl=1;let data=(ecl<<3)|mask,rem=data;for(let i=0;i<10;i++)rem=(rem<<1)^((rem>>>9)*1335);return ((data<<10)|rem)^21522}function bit(v,i){return ((v>>>i)&1)!==0}function format(set,mask){const b=fb(mask);for(let i=0;i<=5;i++)set(8,i,bit(b,i));set(8,7,bit(b,6));set(8,8,bit(b,7));set(7,8,bit(b,8));for(let i=9;i<15;i++)set(14-i,8,bit(b,i));for(let i=0;i<8;i++)set(SIZE-1-i,8,bit(b,i));for(let i=8;i<15;i++)set(8,SIZE-15+i,bit(b,i));set(8,SIZE-8,true)}function createSVG(text,scale=5){const m=createMatrix(text),q=4,n=m.length+q*2,rects=[];for(let y=0;y<m.length;y++)for(let x=0;x<m.length;x++)if(m[y][x])rects.push(`<rect x="${x+q}" y="${y+q}" width="1" height="1"/>`);return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${n} ${n}" width="${n*scale}" height="${n*scale}" role="img" aria-label="QR code"><rect width="100%" height="100%" fill="#fff"/><g fill="#020617">${rects.join("")}</g></svg>`}return{createMatrix,createSVG}})();


    function runInternalSmokeTests(){
      const sample={id:"test",firstName:"Test",lastName:"User",gender:"—",role:"VIP",badgeCode:"WW26-TEST",serial:"SER-TEST",scanStatus:"not_scanned",createdAt:now()};
      const checks=[
        ["renderBadge", typeof renderBadge(sample)==="string" && renderBadge(sample).includes("ww-badge")],
        ["filterReservations", Array.isArray(filterReservations())],
        ["filterParticipants", Array.isArray(filterParticipants())],
        ["buildBadgeSVG", typeof buildBadgeSVG(sample)==="string" && buildBadgeSVG(sample).includes("<svg")],
        ["ticketHash", typeof ticketHash(sample)==="string" && ticketHash(sample).length>10],
        ["modalParticipant", typeof renderModal==="function"],
      ];
      return checks.map(([name,ok])=>({name,ok}));
    }


    
    function logout(){
      const s=session();
      if(s?.login) addLog("logout","Déconnexion administrateur",s.login);
      stopScanner(false);
      localStorage.removeItem(LS.session);
      state.adminsUnlocked=false;
      state.selected=null;
      state.modal=null;
      state.lastScanResult=null;
      toast({type:"info",title:"Déconnexion",message:"La session administrateur a été fermée correctement."});
      nav("reservation");
    }

    function openLogsModal(){
      state.modal={type:"logs"};
      render();
    }

    function markLogsRead(){
      const l=logs().map(x=>({...x,read:true}));
      saveLogs(l);
      toast({type:"success",title:"Logs marqués comme lus",message:"Toutes les notifications administrateur sont maintenant lues."});
      state.modal={type:"logs"};
      render();
    }

    function runFullDiagnostics(){
      const sample={id:"diag",firstName:"Test",lastName:"User",gender:"Masculin",role:"VIP",badgeCode:"WW26-DIAG01",serial:"SER-DIAG",scanStatus:"not_scanned",createdAt:now()};
      const checks=[];
      const add=(name,ok,detail)=>checks.push({name,ok:!!ok,detail});
      try{add("Démarrage application",!!document.getElementById("app"),"Conteneur #app disponible")}catch(e){add("Démarrage application",false,e.message)}
      try{add("Stockage réservations",Array.isArray(reservations()),"Lecture des réservations")}catch(e){add("Stockage réservations",false,e.message)}
      try{add("Stockage participants",Array.isArray(participants()),"Lecture des participants")}catch(e){add("Stockage participants",false,e.message)}
      try{add("Admin par défaut",admins().some(a=>a.login==="White"),"Compte White disponible")}catch(e){add("Admin par défaut",false,e.message)}
      try{add("Tickets publics",JSON.stringify(activePublicRoles().sort())===JSON.stringify(PUBLIC_TICKET_ROLES.slice().sort()),"VIP/Couple/Participant/Sponsor")}catch(e){add("Tickets publics",false,e.message)}
      try{add("Téléphone russe",isRussianPhone("+7 (999) 123-45-67"),"Format +7 validé")}catch(e){add("Téléphone russe",false,e.message)}
      try{add("QR court",ticketHash(sample).length<=64,"Payload QR compatible")}catch(e){add("QR court",false,e.message)}
      try{add("Rendu badge",renderBadge(sample).includes("badge-img"),"Template badge rendu")}catch(e){add("Rendu badge",false,e.message)}
      try{add("Export SVG",buildBadgeSVG(sample).includes("<svg"),"SVG exportable")}catch(e){add("Export SVG",false,e.message)}
      try{add("Recherche réservations",Array.isArray(filterReservations()),"Filtre réservations stable")}catch(e){add("Recherche réservations",false,e.message)}
      try{add("Recherche participants",Array.isArray(filterParticipants()),"Filtre participants stable")}catch(e){add("Recherche participants",false,e.message)}
      try{add("Scanner",typeof startScanner==="function" && typeof findParticipantByHash==="function","Scanner + vérification disponibles")}catch(e){add("Scanner",false,e.message)}
      try{add("Logs",Array.isArray(logs()),"Journaux lisibles")}catch(e){add("Logs",false,e.message)}
      try{add("Undo",Array.isArray(getArray("white_wave_undo_history")),"Historique undo prêt")}catch(e){add("Undo",false,e.message)}
      return checks;
    }

    function runTestsAndShow(){
      const results=runFullDiagnostics();
      state.tests=results;
      state.modal={type:"tests"};
      addLog("tests",`Tests exécutés : ${results.filter(x=>x.ok).length}/${results.length} OK`);
      render();
    }


    function registerOfflineWorker(){
      if(!("serviceWorker" in navigator) || location.protocol==="file:") return;
      const code=`const CACHE='white-wave-v1';const ASSETS=[self.registration.scope];self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));self.skipWaiting()});self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim())});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(cached=>cached||fetch(e.request).then(response=>{if(e.request.method==='GET'){const clone=response.clone();caches.open(CACHE).then(c=>c.put(e.request,clone)).catch(()=>{})}return response}).catch(()=>caches.match(self.registration.scope))))});`;
      const url=URL.createObjectURL(new Blob([code],{type:"application/javascript"}));
      navigator.serviceWorker.register(url).then(()=>URL.revokeObjectURL(url)).catch(()=>URL.revokeObjectURL(url));
    }

    function showBootError(error){
      console.error("White Wave boot error:", error);
      const app=document.getElementById("app");
      if(app){
        app.innerHTML=`<main class="container" style="padding-top:40px"><section class="card glass"><h1>⚠️ Erreur de démarrage</h1><p>Le site a rencontré une erreur au chargement, mais l'écran vide a été évité.</p><pre style="white-space:pre-wrap;overflow:auto;background:rgba(2,6,23,.08);padding:14px;border-radius:14px">${esc(error?.message||String(error))}</pre><button class="btn primary" onclick="localStorage.removeItem('white_wave_admin_session');location.reload()">Réinitialiser la session et recharger</button></section></main>`;
      }
    }
    function bootWhiteWaveApp(){
      try{
        initStorage();
        registerOfflineWorker();
        render();
      }catch(error){
        showBootError(error);
      }
    }
    bootWhiteWaveApp();
  </script>
